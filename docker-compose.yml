services:
  vpn-proxy:
    build: .
    container_name: vpn-proxy
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - SECRET_KEY=${SECRET_KEY:-change-me-in-production-use-a-strong-secret-key}
      - DATABASE_URL=sqlite:///./data/vpnproxy.db
      - GLUETUN_IMAGE=qmcgaw/gluetun:latest
    restart: unless-stopped
    networks:
      - vpn-proxy-net

networks:
  vpn-proxy-net:
    driver: bridge
